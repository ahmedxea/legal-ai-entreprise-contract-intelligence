name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — type-check and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://lexra-backend-ahmedelabed.azurewebsites.net

  backend:
    name: Backend — lint and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/ --select E,F --ignore E501

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        env:
          ENVIRONMENT: test
          SECRET_KEY: ci-test-secret-key
          MOCK_MODE: "true"
